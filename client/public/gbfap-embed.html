<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GBFAP Embed</title>
    <style>
      html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
      #wrap { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
      canvas { width: 100%; height: 100%; display: block; }
      .hidden { display: none !important; }
    </style>
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.0/backbone-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.1/underscore-min.js"></script>
    <script src="https://mizagbf.github.io/GBFML/js/util.js"></script>
    <script src="https://mizagbf.github.io/GBFAP/js/player.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="gbfap-canvas"></canvas>
    </div>
    <script>
      const qs = new URLSearchParams(window.location.search);
      const id = qs.get('id');
      const mode = qs.get('mode') || 'npc';
      const initial = qs.get('initial') || 'wait';
      const origin = qs.get('origin') || window.location.origin;
      const canvasId = 'gbfap-canvas';
      const safePost = (msg) => {
        try { window.parent?.postMessage(msg, origin); } catch {}
      };
      const canLoad = () => typeof window.load_player === 'function';
      const canSwitch = () => typeof window.player_switch_animation === 'function';
      const switchAnim = (anim) => {
        if (!canSwitch()) return false;
        try {
          if (window.player_switch_animation.length >= 2) window.player_switch_animation(anim, canvasId);
          else window.player_switch_animation(anim);
          return true;
        } catch {
          return false;
        }
      };
      const load = () => {
        if (!id || !canLoad()) return;
        try {
          window.load_player({
            use_game_config: 'proxy',
            canvas: canvasId,
            id,
            type: mode,
            animation: initial,
          });
          safePost({ type: 'gbfap:loaded', id, mode });
        } catch (e) {
          safePost({ type: 'gbfap:error', id, mode, message: String(e?.message || e) });
        }
      };
      window.addEventListener('message', (event) => {
        if (event.origin !== origin) return;
        const data = event.data || {};
        if (data.type === 'gbfap:anim') {
          const anim = data.anim;
          const durationMs = Number(data.durationMs || 0);
          const backTo = data.backTo || 'wait';
          if (!anim) return;
          const ok = switchAnim(anim);
          if (ok && durationMs > 0) setTimeout(() => switchAnim(backTo), durationMs);
        }
      });
      load();
    </script>
  </body>
</html>
